[project]
site_name = "Mopidy"
site_description = "Mopidy is an extensible music server written in Python."
site_author = "Stein Magnus Jodal and contributors"
site_url = "https://docs.mopidy.com/"
copyright = """
Copyright &copy; 2009-2026 Stein Magnus Jodal and contributors
"""
edit_uri = "edit/main/docs/"
repo_url = "https://github.com/mopidy/mopidy"
use_directory_urls = true

[project.theme]
language = "en"
logo = "images/logo.png"
features = [
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue"
palette.primary = "green"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.theme.font]
text = "Asap"
#code = "Jetbrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/mopidy/mopidy"

[project.markdown_extensions.pymdownx.keys]
# More visual rendering of keyboard shortcuts

[project.markdown_extensions.pymdownx.snippets]
# Include snippets from other files with --8<--

[project.markdown_extensions.pymdownx.superfences]
# Better code block support

[project.markdown_extensions.tables]
# Nice data tables, used e.g. for config values.
